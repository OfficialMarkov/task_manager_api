name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Show Python info
        run: |
          python --version
          pip --version

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          TEST_DATABASE_URL: sqlite+aiosqlite:///./test_task_manager.db
        run: |
          if [ -d "task_manager_api/tests" ]; then
            TEST_PATH="task_manager_api/tests"
          elif [ -d "tests" ]; then
            TEST_PATH="tests"
          else
            echo "Tests directory not found (checked: task_manager_api/tests and tests)"
            exit 1
          fi
          echo "Using test path: $TEST_PATH"
          python -m pytest "$TEST_PATH" -v --tb=short
